name: Publish Python Desktop

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: TaskManagerDesktop-linux
          - os: windows-latest
            artifact: TaskManagerDesktop-windows
          - os: macos-latest
            artifact: TaskManagerDesktop-macos
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install desktop dependencies
        working-directory: desktop_python
        run: |
          python -m pip install --upgrade pip
          pip install -e . pyinstaller

      - name: Build desktop bundle
        working-directory: desktop_python
        run: pyinstaller pyinstaller.spec

      - name: Archive desktop bundle
        shell: bash
        run: |
          cd desktop_python/dist
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            powershell -Command "Compress-Archive -Path TaskManagerDesktop.exe -DestinationPath ../${{ matrix.artifact }}.zip"
          else
            tar -czf ../${{ matrix.artifact }}.tar.gz TaskManagerDesktop
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            desktop_python/${{ matrix.artifact }}.zip
            desktop_python/${{ matrix.artifact }}.tar.gz

      - name: Attach release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            desktop_python/${{ matrix.artifact }}.zip
            desktop_python/${{ matrix.artifact }}.tar.gz
