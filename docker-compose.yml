services:
  caldav:
    image: tomsquest/docker-radicale:3.5.6.0
    container_name: taskmanagerwebdav-caldav
    volumes:
      - ./docker/radicale/config:/etc/radicale/config:ro
      - ./docker/radicale/users:/etc/radicale/users:ro
      - ./docker-data/radicale:/data
    restart: unless-stopped

  caldav-proxy:
    image: nginx:1.29-alpine
    container_name: taskmanagerwebdav-caldav-proxy
    depends_on:
      - caldav
    ports:
      - "5232:5232"
    volumes:
      - ./docker/nginx/caldav.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
