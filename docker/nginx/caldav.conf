server {
    listen 5232;
    server_name localhost;

    location / {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "http://localhost:5173" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS, PROPFIND, REPORT, MKCALENDAR, MKCOL" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Depth, Destination, If-Match, If-None-Match, Prefer, Origin, X-Requested-With" always;
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }

        proxy_pass http://caldav:5232;
        proxy_http_version 1.1;
        proxy_set_header Host $host:$server_port;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        add_header Access-Control-Allow-Origin "http://localhost:5173" always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS, PROPFIND, REPORT, MKCALENDAR, MKCOL" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Depth, Destination, If-Match, If-None-Match, Prefer, Origin, X-Requested-With" always;
        add_header Access-Control-Expose-Headers "ETag, Location, DAV" always;
    }
}
